[options]
addons_path = /mnt/extra-addons,/usr/lib/python3/dist-packages/odoo/addons
data_dir = /var/lib/odoo

; Database
db_host = db
db_port = 5432
db_user = odoo
db_password = odoo_password
db_name = ma_erp

; Security — change before going to production
admin_passwd = MA_ERP_MASTER_2026

; Performance
workers = 2
max_cron_threads = 1
limit_memory_hard = 2684354560
limit_memory_soft = 2147483648
limit_request = 8192
limit_time_cpu = 600
limit_time_real = 1200

; Logging
log_level = info

; Email — configure with your SMTP server
; email_from = erp@yourdomain.com
; smtp_server = smtp.yourdomain.com
; smtp_port = 587
; smtp_ssl = False
; smtp_user = erp@yourdomain.com
; smtp_password = your_smtp_password
